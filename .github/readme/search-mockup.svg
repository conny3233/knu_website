<svg width="1000" height="420" viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="초성 검색 팔레트 예시: ㅅㄱㅅㅊ 를 입력하면 수강신청이 바로 나온다">
  <defs>
    <clipPath id="page-clip"><rect x="0" y="0" width="1000" height="420" rx="16" /></clipPath>
  </defs>

  <g clip-path="url(#page-clip)">
    <!-- 뒤에 흐릿하게 깔린 링크 카드들: 팔레트가 페이지 위에 뜬다는 느낌만 -->
    <rect x="0" y="0" width="1000" height="420" fill="#FBFAF8" />
    <g opacity="0.5">
      <g transform="translate(48,32)">
        <rect width="272" height="72" fill="none" stroke="#E3DED6" stroke-width="1.5" />
        <rect x="18" y="18" width="120" height="14" fill="#CDC6BB" />
        <rect x="18" y="40" width="80" height="10" fill="#E3DED6" />
      </g>
      <g transform="translate(336,32)">
        <rect width="272" height="72" fill="none" stroke="#E3DED6" stroke-width="1.5" />
        <rect x="18" y="18" width="140" height="14" fill="#CDC6BB" />
        <rect x="18" y="40" width="90" height="10" fill="#E3DED6" />
      </g>
      <g transform="translate(624,32)">
        <rect width="272" height="72" fill="none" stroke="#E3DED6" stroke-width="1.5" />
        <rect x="18" y="18" width="110" height="14" fill="#CDC6BB" />
        <rect x="18" y="40" width="70" height="10" fill="#E3DED6" />
      </g>
      <g transform="translate(48,120)">
        <rect width="272" height="72" fill="none" stroke="#E3DED6" stroke-width="1.5" />
        <rect x="18" y="18" width="100" height="14" fill="#CDC6BB" />
        <rect x="18" y="40" width="85" height="10" fill="#E3DED6" />
      </g>
      <g transform="translate(624,120)">
        <rect width="272" height="72" fill="none" stroke="#E3DED6" stroke-width="1.5" />
        <rect x="18" y="18" width="130" height="14" fill="#CDC6BB" />
        <rect x="18" y="40" width="75" height="10" fill="#E3DED6" />
      </g>
    </g>

    <!-- 어두운 오버레이 -->
    <rect x="0" y="0" width="1000" height="420" fill="#1A1714" opacity="0.14" />

    <!-- 커맨드 팔레트 -->
    <g>
      <rect x="90" y="70" width="820" height="182" fill="#FBFAF8" stroke="#CDC6BB" stroke-width="1.5" />

      <!-- 입력 줄 -->
      <line x1="90" y1="134" x2="910" y2="134" stroke="#E3DED6" stroke-width="1.5" />
      <circle cx="132" cy="102" r="9" fill="none" stroke="#797977" stroke-width="2" />
      <line x1="139" y1="109" x2="148" y2="118" stroke="#797977" stroke-width="2" stroke-linecap="round" />
      <text x="164" y="112" font-family="'Malgun Gothic',sans-serif" font-size="27" font-weight="700" fill="#1A1714">ㅅㄱㅅㅊ</text>
      <rect x="854" y="88" width="40" height="26" fill="none" stroke="#E3DED6" stroke-width="1.5" />
      <text x="874" y="105" text-anchor="middle" font-family="'Consolas','IBM Plex Mono',monospace" font-size="12" fill="#797977">esc</text>

      <!-- 결과 행 (선택됨) -->
      <rect x="93" y="134" width="4" height="52" fill="#B00000" />
      <rect x="97" y="134" width="713" height="52" fill="#FDF2F1" />
      <text x="122" y="167" font-family="'Malgun Gothic',sans-serif" font-size="18" font-weight="700" fill="#B00000">수강신청</text>
      <text x="560" y="166" font-family="'Consolas','IBM Plex Mono',monospace" font-size="14" fill="#797977">sugang.knu.ac.kr</text>
      <text x="880" y="166" text-anchor="end" font-family="'Malgun Gothic',sans-serif" font-size="12" fill="#5C5650">핵심 시스템</text>

      <!-- 하단 힌트 줄 -->
      <line x1="90" y1="216" x2="910" y2="216" stroke="#E3DED6" stroke-width="1.5" />
      <text x="122" y="240" font-family="'Malgun Gothic',sans-serif" font-size="13" fill="#797977">초성 검색을 지원합니다 · <tspan fill="#5C5650" font-family="'Consolas','IBM Plex Mono',monospace">ㄷㅅㄱ</tspan> → 도서관</text>

      <g font-family="'Malgun Gothic',sans-serif" font-size="12" fill="#797977">
        <rect x="640" y="226" width="20" height="20" fill="none" stroke="#E3DED6" stroke-width="1.3" />
        <text x="650" y="240" text-anchor="middle" font-family="'Consolas','IBM Plex Mono',monospace" font-size="11">↑</text>
        <rect x="664" y="226" width="20" height="20" fill="none" stroke="#E3DED6" stroke-width="1.3" />
        <text x="674" y="240" text-anchor="middle" font-family="'Consolas','IBM Plex Mono',monospace" font-size="11">↓</text>
        <text x="692" y="240">이동</text>

        <rect x="726" y="226" width="20" height="20" fill="none" stroke="#E3DED6" stroke-width="1.3" />
        <text x="736" y="240" text-anchor="middle" font-family="'Consolas','IBM Plex Mono',monospace" font-size="11">↵</text>
        <text x="754" y="240">새 탭에서 열기</text>

        <rect x="852" y="226" width="20" height="20" fill="none" stroke="#E3DED6" stroke-width="1.3" />
        <text x="862" y="240" text-anchor="middle" font-family="'Consolas','IBM Plex Mono',monospace" font-size="11">⌘</text>
        <rect x="876" y="226" width="20" height="20" fill="none" stroke="#E3DED6" stroke-width="1.3" />
        <text x="886" y="240" text-anchor="middle" font-family="'Consolas','IBM Plex Mono',monospace" font-size="11">K</text>
      </g>
    </g>
  </g>

  <rect x="0.5" y="0.5" width="999" height="419" fill="none" stroke="#E3DED6" stroke-width="1" rx="16" />
</svg>
