<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="경북대 링크 허브">
  <defs>
    <clipPath id="card-clip">
      <rect x="1" y="1" width="1198" height="358" rx="28" />
    </clipPath>
    <radialGradient id="tint-blob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDF2F1" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#FDF2F1" stop-opacity="0" />
    </radialGradient>
    <clipPath id="csd-body-banner">
      <path d="M13.8 31 C13.3 23.5, 14.5 16.5, 16.4 11.7 L23.6 11.7 C25.5 16.5, 26.7 23.5, 26.2 31 Z" />
    </clipPath>
  </defs>

  <g clip-path="url(#card-clip)">
    <rect x="0" y="0" width="1200" height="360" fill="#FBFAF8" />
    <circle cx="1040" cy="60" r="260" fill="url(#tint-blob)" />
    <circle cx="60" cy="360" r="220" fill="url(#tint-blob)" />

    <!-- 화합의 원, 아주 흐리게, 배경 결로만 -->
    <circle cx="600" cy="180" r="330" fill="none" stroke="#E3DED6" stroke-width="1" opacity="0.6" />

    <!-- 첨성대 + 6개의 별 -->
    <g transform="translate(80,90) scale(4.5)" style="color:#B00000">
      <circle cx="20" cy="20" r="18.6" stroke="currentColor" stroke-width="1.1" opacity="0.35" fill="none" />
      <circle cx="34.68" cy="16.07" r="1.35" fill="currentColor" />
      <circle cx="30.75" cy="9.25" r="1.35" fill="currentColor" />
      <circle cx="23.93" cy="5.32" r="1.35" fill="currentColor" />
      <circle cx="16.07" cy="5.32" r="1.35" fill="currentColor" />
      <circle cx="9.25" cy="9.25" r="1.35" fill="currentColor" />
      <circle cx="5.32" cy="16.07" r="1.35" fill="currentColor" />
      <rect x="11.4" y="31" width="17.2" height="1.7" fill="currentColor" />
      <path d="M13.8 31 C13.3 23.5, 14.5 16.5, 16.4 11.7 L23.6 11.7 C25.5 16.5, 26.7 23.5, 26.2 31 Z"
            stroke="currentColor" stroke-width="1.35" stroke-linejoin="round" fill="#FBFAF8" />
      <g clip-path="url(#csd-body-banner)" stroke="currentColor" stroke-width="0.85" opacity="0.45">
        <line x1="12" y1="27" x2="28" y2="27" />
        <line x1="12" y1="23.2" x2="28" y2="23.2" />
        <line x1="12" y1="16.2" x2="28" y2="16.2" />
        <line x1="12" y1="13" x2="28" y2="13" />
      </g>
      <rect x="18.3" y="19" width="3.4" height="3.4" fill="currentColor" />
      <rect x="15.4" y="9.5" width="9.2" height="2.2" stroke="currentColor" stroke-width="1.1" fill="none" />
    </g>

    <!-- 제목 -->
    <text x="298" y="172" font-family="Georgia, 'Noto Serif KR', 'Malgun Gothic', serif" font-size="60" font-weight="700" fill="#1A1714">경북대 링크 허브</text>
    <text x="300" y="216" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" fill="#5C5650">학교 사이트 227곳을 한 페이지에, 검색 한 번으로</text>

    <!-- 비공식 배지 -->
    <rect x="946" y="40" width="182" height="36" rx="18" fill="none" stroke="#B00000" stroke-width="1.3" />
    <text x="1037" y="63" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="14" font-weight="600" fill="#B00000" letter-spacing="0.5">비공식 · 학생 프로젝트</text>

    <!-- 하단 통계 줄 -->
    <line x1="80" y1="285" x2="1120" y2="285" stroke="#E3DED6" stroke-width="1.5" />
    <text x="80" y="318" font-family="'Consolas','IBM Plex Mono',monospace" font-size="15" letter-spacing="1" fill="#5C5650">227 LINKS&#160;&#160;&#160;·&#160;&#160;&#160;10 CATEGORIES&#160;&#160;&#160;·&#160;&#160;&#160;NO LOGIN&#160;&#160;&#160;·&#160;&#160;&#160;⌘K TO SEARCH</text>
  </g>

  <rect x="1" y="1" width="1198" height="358" rx="28" fill="none" stroke="#E3DED6" stroke-width="2" />
</svg>
